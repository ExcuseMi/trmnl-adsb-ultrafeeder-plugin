services:
  trmnl-adsb-ultrafeeder:
    build: ./trmnl-adsb-ultrafeeder-plugin/backend
    container_name: trmnl-adsb-backend
    restart: unless-stopped
    env_file: .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=4)"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - ultrafeeder
    volumes:
      - trmnl-adsb-state:/data
    deploy:
      resources:
        limits:
          memory: 1g

volumes:
  trmnl-adsb-state:
