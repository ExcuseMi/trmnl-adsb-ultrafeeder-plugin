# TRMNLP configuration
# {{ env.VARIABLE }} interpolation is available here
---
# auto-reload when files change (`watch: false` to disable)
watch:
  - .trmnlp.yml
  - src

# values of custom fields (defined in src/settings.yml)
custom_fields: {}

# override variables
variables:
  trmnl:
    system:
      timestamp_utc: 1744000000
    plugin_settings:
      instance_name: "ADS-B Ultrafeeder"
      strategy: webhook
      dark_mode: 'yes'
      no_screen_padding: 'no'
      polling_headers: ''
      polling_url: ''
      custom_fields_values:
        unit: imperial
        radar_scale: '200'
        route_display: codes
  # Raw webhook variables — exactly what the backend pushes via merge_variables
  # ac: array-of-arrays [cs, ty, alt, spd, trk, src, lat, lon, trail?, origin?, dest?, progress?, desc?, emergency?]
  ac:
    - ["BAW123", "A320", 35000, 450, 245, 0, 51.16, 4.48, [[-13, -18], [-26, -36]], "LHR", "AMS", 45, "Airbus A320neo", null]
    - ["EZY42V", "A319", 12000, 380, 178, 1, 51.09, 4.60, null, null, null, null, null, null]
    - ["", "C172", 2500, 95, 312, 0, 51.21, 4.49, null, null, null, null, null, null]
    - ["OPS999", "B738", 18000, 310, 90, 0, 51.15, 4.62, null, null, null, null, null, "7700"]
    - ["DLH441", "A321", 38000, 480, 60, 0, 51.08, 4.51, null, "FRA", "AMS", 72, "Airbus A321", null]
  hn: [38, 42, 35, 41, 44, 40, 37, 39, 42, 41, 38, 36, 33, 35, 38, 40, 43, 44, 42, 39, 37, 40, 42, 44]
  hr: [180, 175, 168, 182, 190, 185, 178, 172, 180, 183, 188, 175, 170, 168, 172, 175, 180, 185, 180, 178, 175, 180, 185, 190]
  hn_max: 44
  hr_max: 190
  s: [42, 8, 180, 247, 1250]
  # fc: [feeder_lat, feeder_lon, cos(feeder_lat * PI/180)]
  fc: [51.1234, 4.5678, 0.6276]
  ts: 1744046520
