---
strategy: webhook
no_screen_padding: 'no'
dark_mode: 'yes'
static_data: ''
polling_verb: get
framework_version: 3.1.0
serverless_language: ''
polling_url: ''
polling_headers: ''
polling_body: ''
id: 296015
custom_fields:
- keyname: author_info
  name: About ADS-B Ultrafeeder
  field_type: author_bio
  description: Live aircraft radar from your own ADS-B receiver, updated every 5 minutes. Pairs with <a href="https://github.com/sdr-enthusiasts/docker-adsb-ultrafeeder" target="_blank">docker-adsb-ultrafeeder</a> — no cloud API, no rate limits. <br /><br /><strong>Radar</strong><br /> Aircraft dots positioned by lat/lon. Trail dots show recent path. Emergency squawks flagged automatically. <br /><br /><strong>Stats</strong><br /> Live aircraft count, MLAT count, max range, message rate. <br /><br /><strong>Sparklines</strong><br /> Rolling history of aircraft count and max range over your configured timeframe.
  github_url: https://github.com/ExcuseMi/trmnl-adsb-ultrafeeder-plugin
  category: travel,environment
  help_text: Self-hosted · No cloud API
- keyname: webhook_url
  field_type: copyable_webhook_url
  name: Webhook URL
  description: Copy this URL and set it as <code>TRMNL_WEBHOOK_URL</code> in your Docker environment. The container pushes data to this address on every poll cycle.
- keyname: unit
  field_type: select
  name: Measurement Units
  description: Unit system for altitude and speed display on aircraft labels.
  options:
  - Imperial (ft, kt): imperial
  - Metric (m, km/h): metric
  default: imperial
  optional: true
- keyname: radar_scale
  field_type: select
  name: Radar Scale
  description: Maximum range shown on the radar panel. Planes beyond this distance are shown at the edge.
  options:
  - 50 nm (~90 km): '50'
  - 100 nm (~185 km): '100'
  - 200 nm (~370 km): '200'
  - 300 nm (~555 km): '300'
  default: '200'
  optional: true
- keyname: tile_style
  field_type: select
  name: Map Style
  description: <strong>Free (CartoDB)</strong> — no account needed. Light or dark follows your display setting.<br /><br /> <strong>Stamen styles</strong> — high-contrast monochrome tiles optimised for e-ink. A free <a href="https://client.stadiamaps.com/signup/" target="_blank">Stadia Maps</a> API key is required (free account, 200,000 tile credits/month included).
  help_text: <a href="https://docs.stadiamaps.com/themes/" target="_blank">Preview all map styles →</a>
  options:
  - 'Free: CartoDB Dark': cartodb_dark
  - 'Free: CartoDB Light': cartodb_light
  - 'Stamen: Toner (B&W)': stamen_toner
  - 'Stamen: Toner Lite': stamen_toner_lite
  - 'Stamen: Toner Dark': stamen_toner_dark
  - 'Stamen: Toner Blacklite': stamen_toner_blacklite
  - 'Stamen: Toner Background (no labels)': stamen_toner_background
  - 'Stamen: Terrain': stamen_terrain
  - 'Stamen: Watercolor': stamen_watercolor
  default: cartodb_dark
  optional: true
  conditional_validation:
  - when: cartodb_dark
    hidden:
    - stadia_api_key
  - when: cartodb_light
    hidden:
    - stadia_api_key
- keyname: stadia_api_key
  field_type: password
  name: Stadia Maps API Key
  description: Required for Stamen styles.<br /><br />Free account — get your key at <a href="https://client.stadiamaps.com/signup/" target="_blank">stadiamaps.com</a><br />200,000 tile credits/month included.
- keyname: center_lat
  field_type: string
  name: Radar Center Latitude
  description: Latitude to center the radar map on. Leave blank to use your feeder position. Useful when most of your traffic is in one direction.
  help_text: Find coordinates at <a href="https://www.latlong.net/" target="_blank">latlong.net</a>
  optional: true
- keyname: center_lon
  field_type: string
  name: Radar Center Longitude
  description: Longitude to center the radar map on. Leave blank to use your feeder position.
  help_text: Find coordinates at <a href="https://www.latlong.net/" target="_blank">latlong.net</a>
  optional: true
- keyname: show_feeder_icon
  field_type: select
  name: Feeder Icon
  description: Show or hide the house icon marking your feeder position on the radar.
  options:
  - Show: 'yes'
  - Hide: 'no'
  default: 'yes'
  optional: true
name: ADS-B Ultrafeeder
refresh_interval: 15
